name: Release npm package

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write   # required for npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      # Check if there are changesets to release
      - name: Check changesets
        run: npx changeset status

      # Apply version bumps + generate changelogs
      - name: Version packages
        run: npx changeset version

      # Commit version bump so git stays in sync
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: version packages"

      # Publish with npm provenance (THIS is correct place for it)
      - name: Publish to npm (OIDC + provenance)
        run: npm publish --provenance --access public