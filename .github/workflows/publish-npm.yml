name: Release npm package

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write   # required for npm provenance (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      # 👉 Detect if a release is actually needed
      - name: Check changesets
        id: changesets
        run: |
          npx changeset status
          echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT

      # 👉 Exit early if nothing to release
      - name: Stop if no changesets
        if: steps.changesets.outputs.HAS_CHANGES != 'true'
        run: echo "No changesets found. Skipping release."

      # Everything below only runs if changesets exist
      - name: Version packages
        if: steps.changesets.outputs.HAS_CHANGES == 'true'
        run: npx changeset version

      - name: Commit version bump
        if: steps.changesets.outputs.HAS_CHANGES == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: version packages"

      - name: Create Git tag
        if: steps.changesets.outputs.HAS_CHANGES == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag v$VERSION

      - name: Push changes + tags
        if: steps.changesets.outputs.HAS_CHANGES == 'true'
        run: |
          git push origin main --tags

      - name: Publish to npm (OIDC + provenance)
        if: steps.changesets.outputs.HAS_CHANGES == 'true'
        run: npm publish --provenance --access public