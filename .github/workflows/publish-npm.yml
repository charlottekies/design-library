name: Release npm package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      # 1. Run changesets to check for status / create PRs, but DON'T let it publish
      # We use an output variable to see if a publish is actually needed
      - name: Create release PR or version package
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset version
          commit: "chore: release version"
          title: "chore: release version"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Run the publish natively so the GitHub OIDC token is correctly passed to npm
      # This step only runs if Changesets didn't just create a PR and actually wants to publish
      - name: Publish to npm via Trusted Publishing
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: npm publish --provenance --access public
